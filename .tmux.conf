# Define a tecla prefixo como: "Ctrl + X" (em vez: "Ctrl + B")
set -g prefix C-x
unbind C-x
bind C-x send-prefix
# Sporte ao mouse.
set -g mouse on
# Limite de histórico de rolagem.
set -g history-limit 10000
# Definição do índice/painéis.
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
